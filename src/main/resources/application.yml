server:
  port: 8080

resend:
  api-key: ${RESEND_API_KEY}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
  refresh-expiration: 604800000

cloudinary:
  cloud-name: ${CLOUDINARY_CLOUD_NAME}
  api-key: ${CLOUDINARY_API_KEY}
  api-secret: ${CLOUDINARY_API_SECRET}

groq:
  api-key: ${GROQ_API_KEY}

skin-model:
  api-url: ${SKIN_MODEL_URL:http://localhost:5000}

app:
  allowed-origins:
    - http://localhost:3000
    - http://localhost:8081
    - https://glow-sense-backend.onrender.com
